name: Build bundles

on:
  push:
    branches:
      - v3.45-docs

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run bundle-package

      - name: Copy files to server over SSH
        uses: garygrossgarten/github-action-scp@0.9.0
        with:
          local: "packages/core-js-bundle/minified.js"
          remote: "/var/www/core-js/bundles/${{ steps.extract_branch.outputs.branch }}/core-js-bundle.js"
          host: ${{ secrets.REMOTE_HOST }}
          username: ci
          privateKey: ${{ secrets.CI_SSH_KEY }}
